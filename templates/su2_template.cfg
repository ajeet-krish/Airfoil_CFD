% ------------------------- SU2 CONFIGURATION FILE -------------------------- %
%                                                                             %
% Wind Tunnel Simulation of NACA 0012 Airfoil                                 %
%                                                                             %
% --------------------------------------------------------------------------- %

% --- SOLVER DEFINITIONS ---
SOLVER= RANS
KIND_TURB_MODEL= SA
MATH_PROBLEM= DIRECT

% --- REYNOLDS NUMBER & FREESTREAM DEFINITIONS ---
MACH_NUMBER= 0.15
AOA= {{AOA}}
REYNOLDS_NUMBER= 1000000.0
REYNOLDS_LENGTH= 1.0

% --- THERMODYNAMIC PROPERTIES ---
FLUID_MODEL= STANDARD_AIR
GAMMA_VALUE= 1.4
GAS_CONSTANT= 287.05
FREESTREAM_TEMPERATURE= 288.15
FREESTREAM_PRESSURE= 101325.0

% --- BOUNDARY CONDITIONS ---
MARKER_FAR= ( farfield )
MARKER_HEATFLUX= ( airfoil, 0.0 )
MARKER_MONITORING= ( airfoil )

% --- NUMERICAL METHODS ---
NUM_METHOD_GRAD= GREEN_GAUSS
CONV_NUM_METHOD_FLOW= ROE
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN
MUSCL_TURB= NO

% --- ITERATIVE CONTROLS ---
ITER= 200
CFL_NUMBER= 5.0
CFL_ADAPT= YES
CFL_ADAPT_PARAM= ( 0.5, 2.0, 5.0, 100.0 )

% --- CONVERGENCE CRITERIA ---
CONV_FIELD= RMS_DENSITY

% --- INPUT/OUTPUT FILES ---
MESH_FORMAT= SU2
MESH_FILENAME= {{MESH_FILENAME}}
TABULAR_FORMAT= CSV
CONV_FILENAME= history
VOLUME_FILENAME= flow_results
SURFACE_FILENAME= surface_flow
OUTPUT_WRT_FREQ= 200
HISTORY_WRT_FREQ_INNER= 1

% --- SCREEN OUTPUT CONTROLS ---
SCREEN_OUTPUT= (ITER, RMS_DENSITY, LIFT, DRAG)
